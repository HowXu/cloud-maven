name = "cloud-maven-worker-dev"
main = "src/index.ts"
compatibility_date = "2026-05-29"

[build]
command = "npm --prefix ../maven-client install && npm --prefix ../maven-client run build -- --outDir ../maven-worker/dist && npm run build:worker"

[assets]
binding = "ASSETS"
directory = "./dist"
run_worker_first = true

[vars]
SESSION_TTL_SECONDS = "86400"
DEFAULT_REPOSITORY_POLICY = '{"visibility":"PUBLIC","allowOverwrite":false}'

[env.dev]
name = "cloud-maven-worker-dev"

# Main Config
[env.dev.kv_namespaces]
binding = "MAVEN_KV"
id = "8cf84f007ca34706a5178d3801c159fb"

[env.dev.r2_buckets]
binding = "MAVEN_BUCKET"
bucket_name = "cloud-maven-dev"

name = "cloud-maven-worker"
main = "src/index.ts"
compatibility_date = "2026-05-29"

[build]
command = "npm --prefix ../maven-client install && npm --prefix ../maven-client run build -- --outDir ../maven-worker/dist && npm run build:worker"

[assets]
binding = "ASSETS"
directory = "./dist"
run_worker_first = true

[observability]
enabled = false
head_sampling_rate = 1

[observability.logs]
enabled = true
head_sampling_rate = 1
persist = true
invocation_logs = true

[observability.traces]
enabled = false
persist = true
head_sampling_rate = 1

[vars]
SESSION_TTL_SECONDS = "86400"
DEFAULT_REPOSITORY_POLICY = '{"visibility":"PUBLIC","allowOverwrite":false}'

# Set with: wrangler secret put ADMIN_BOOTSTRAP_TOKEN

[env.production.vars]
SESSION_TTL_SECONDS = "86400"
DEFAULT_REPOSITORY_POLICY = '{"visibility":"PUBLIC","allowOverwrite":false}'

[env.production]
name = "cloud-maven-worker"

# Main Config
[env.production.kv_namespaces]
binding = "MAVEN_KV"
id = ""

[env.production.r2_buckets]
binding = "MAVEN_BUCKET"
bucket_name = ""
